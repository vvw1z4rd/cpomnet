[General]
network = simulations.ned.CampusNetwork
sim-time-limit = 40s

repeat = 5
seed-set = ${repetition}

**.crcMode = "declared"
**.fcsMode = "declared"
**.ipv4.checksum.typename = "InternetChecksum"

*.configurator.typename = "inet.networklayer.configurator.ipv4.Ipv4NetworkConfigurator"
*.configurator.addStaticRoutes = true
*.configurator.assignDisjunctSubnetAddresses = true
*.configurator.addDefaultRoutes = true

*.server1.numApps = 1
*.server1.app[*].typename = "UdpSink"
*.server1.app[*].localPort = 5000

*.server2.numApps = 1
*.server2.app[*].typename = "UdpSink"
*.server2.app[*].localPort = 5001

*.numBranch1Hosts = 20
*.numBranch2Hosts = 20

*.branch1Host[*].numApps = 1
*.branch1Host[*].app[*].typename = "UdpBasicApp"
*.branch1Host[*].app[*].destAddresses = "server1"
*.branch1Host[*].app[*].destPort = 5000
*.branch1Host[*].app[*].startTime = 0s
*.branch1Host[*].app[*].stopTime = 39s
*.branch1Host[*].app[*].messageLength = 1200B
*.branch1Host[*].app[*].sendInterval = exponential(0.07s)

*.branch2Host[*].numApps = 1
*.branch2Host[*].app[*].typename = "UdpBasicApp"
*.branch2Host[*].app[*].destAddresses = "server2"
*.branch2Host[*].app[*].destPort = 5001
*.branch2Host[*].app[*].startTime = 0s
*.branch2Host[*].app[*].stopTime = 39s
*.branch2Host[*].app[*].messageLength = 1200B
*.branch2Host[*].app[*].sendInterval = exponential(0.07s)

**.vector-recording = true
**.scalar-recording = true
**.endToEndDelay.vector-recording = true

*.scenarioManager.script = xml("<scenario><at t='10.0s'><shutdown module='mainRouter'/></at></scenario>")

[Config Base]
description = "Базовая сеть"
*.numBranch1Hosts = 15
*.numBranch2Hosts = 15

*.branch1Host[*].app[*].messageLength = 1000B
*.branch1Host[*].app[*].sendInterval = exponential(0.1s)
*.branch2Host[*].app[*].messageLength = 1000B
*.branch2Host[*].app[*].sendInterval = exponential(0.1s)

[Config Scalability]
description = "Расширенная сеть"
*.numBranch1Hosts = 25
*.numBranch2Hosts = 25

*.branch1Host[*].app[*].messageLength = 1200B
*.branch1Host[*].app[*].sendInterval = exponential(0.07s)
*.branch2Host[*].app[*].messageLength = 1200B
*.branch2Host[*].app[*].sendInterval = exponential(0.07s)
